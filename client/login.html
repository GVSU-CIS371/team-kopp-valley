<!DOCTYPE html>

<html lang="en">
	<head>
		<title>Log In</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<link rel="stylesheet" href="src/login.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	</head>
	
	<body id="login-body">
		<video muted autoplay loop src="public/background-login2.mp4" type="video/mp4"></video>
	
        <div id="login-container">
			<img src="public/launchpad.png">
            <form id="login-form">
                
				<div>
					<label for="username"><i class="fa fa-user"></i></label>
					<input type="text" required id="username" name="username" placeholder="Username" autocomplete="off">
				</div>
                
				<div>
					<label for="pass"><i class="fa fa-lock"></i></label>
                	<input type="text" required id="pass" name="pass" placeholder="Password" autocomplete="off">
				</div>
                               
                
                <button type="submit" class="submit-button">Log In</button>
            </form>
        </div>

	</body>
</html>
